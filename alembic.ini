# Alembic configuration for the proposal engine.
#
# The database URL is NOT hard-coded here; migrations/env.py reads it from
# the application config (DATABASE_URL), so the same config drives the app,
# tests, and migrations. Run with: `alembic upgrade head`.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# Timezone-aware UTC timestamps in generated revision files.
timezone = UTC

[post_write_hooks]
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
