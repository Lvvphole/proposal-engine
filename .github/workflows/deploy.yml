# Backend (API + MCP) deploys to AWS ECS. The Next.js frontend is hosted on
# Vercel and deploys via Vercel's own Git integration (root directory:
# `frontend/`), so it is intentionally not built here. The database is
# Supabase Postgres; migrations run in the `migrate` job below.
name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "commercial/**"
      - "frontend/**"
      - "*.md"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        run: |
          docker build -f infra/Dockerfile --target production \
            -t ${{ steps.ecr-login.outputs.registry }}/proposal-engine-api:${{ github.sha }} \
            -t ${{ steps.ecr-login.outputs.registry }}/proposal-engine-api:latest .
          docker push ${{ steps.ecr-login.outputs.registry }}/proposal-engine-api --all-tags

      - name: Build and push MCP image
        run: |
          docker build -f infra/Dockerfile --target mcp \
            -t ${{ steps.ecr-login.outputs.registry }}/proposal-engine-mcp:${{ github.sha }} \
            -t ${{ steps.ecr-login.outputs.registry }}/proposal-engine-mcp:latest .
          docker push ${{ steps.ecr-login.outputs.registry }}/proposal-engine-mcp --all-tags

  migrate:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Apply database migrations (Supabase)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: alembic upgrade head

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster proposal-engine-production \
            --service proposal-engine-api \
            --force-new-deployment
          aws ecs update-service \
            --cluster proposal-engine-production \
            --service proposal-engine-mcp \
            --force-new-deployment
